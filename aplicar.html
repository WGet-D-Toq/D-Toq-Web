<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicar como Chofer - D-Toq</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4CAF50;
        }
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
        }
        .back-link:hover {
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Unite a D-Toq</h1>
        <p class="subtitle">Completá el formulario para aplicar como chofer</p>
        
        <form id="aplicar-form">
            <div class="form-group">
                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
            </div>
            
            <div class="form-group">
                <label for="telefono">Teléfono de contacto</label>
                <input type="tel" id="telefono" placeholder="Ej: 1155667788" required>
            </div>
            
            <div class="form-group">
                <label for="equipo">Zona / Equipo al que querés unirte</label>
                <select id="equipo" required>
                    <option value="">Seleccioná una zona...</option>
                    <option value="Particular">Particular</option>
                    <option value="San Pedro">San Pedro</option>
                    <option value="La Esperanza">La Esperanza</option>
                    <option value="La Nueva Ciudad">La Nueva Ciudad</option>
                    <option value="La Mendieta">La Mendieta</option>
                    <option value="San Agustín">San Agustín</option>
                    <option value="El Piquete">El Piquete</option>
                    <option value="Santa Clara">Santa Clara</option>
                    <option value="El Fuerte">El Fuerte</option>
                    <option value="Arrayanal">Arrayanal</option>
                    <option value="Salvador Mazza">Salvador Mazza</option>
                </select>
            </div>
            
            <button type="submit">Enviar aplicación</button>
        </form>
        
        <a href="index.html" class="back-link">← Volver al inicio</a>
    </div>
    
    <script src="aplicar.js"></script>
</body>
  </html>
